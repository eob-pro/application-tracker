  <script>
    (function() {
      var dataEl = document.getElementById('backfill-data');
      if (!dataEl) { document.getElementById('msg').textContent = 'No data.'; return; }
      var rows;
      try { rows = JSON.parse(dataEl.textContent); } catch (e) { document.getElementById('msg').textContent = 'Parse error: ' + e.message; return; }
      if (!Array.isArray(rows) || rows.length === 0) { document.getElementById('msg').textContent = 'No data to import.'; return; }
      var STORAGE_APPS = 'application-tracker-applications';
      var STORAGE_COMPANIES = 'application-tracker-companies';
      function loadJson(key, fallback) { try { var r = localStorage.getItem(key); if (r) return JSON.parse(r); } catch(e) {} return fallback; }
      function saveJson(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {} }
      function ensureCompany(companies, name) { var t = (name||'').trim(); if (!t || companies.indexOf(t)>=0) return; companies.push(t); companies.sort(function(a,b){ return a.localeCompare(b); }); }
      var applications = loadJson(STORAGE_APPS, []);
      var companies = loadJson(STORAGE_COMPANIES, []);
      var existingKeys = {};
      applications.forEach(function(app){ var d = (app.statusHistory&&app.statusHistory[0]&&app.statusHistory[0].date) ? app.statusHistory[0].date.slice(0,10) : (app.createdAt||'').slice(0,10); existingKeys[(app.company||'')+'|'+(app.position||'')+'|'+d]=true; });
      var added = 0;
      rows.forEach(function(row){
        var company=(row.company||'').trim(), position=(row.position||row.role||'').trim(), appliedDate=row.appliedDate||'';
        if(!company&&!position) return;
        var key=company+'|'+position+'|'+appliedDate; if(existingKeys[key]) return; existingKeys[key]=true;
        var _st = (row.status||'').trim();
        var status = (['not_hired','closed','closed_on_job_board'].indexOf(_st)>=0)?_st:'applied';
        var dateStr = appliedDate.length===10 ? appliedDate+'T12:00:00.000Z' : new Date().toISOString();
        var _ka = (row.keepAliveEmailAt != null && String(row.keepAliveEmailAt).trim()) ? String(row.keepAliveEmailAt).trim().slice(0, 10) : '';
        applications.unshift({ id: (typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():'id-'+Date.now()+'-'+Math.random().toString(36).slice(2), company:company, position:position, scope:'', jobId:(row.jobId||'').trim(), status:status, statusHistory:[{status:status,date:dateStr}], sourceId:'linkedin', originalListingDate:'', atsSystem:'', resumeVersion:'', coverLetterUsed:'', customCoverLetter:false, customResume:false, selects:!!row.selects, keepAliveEmailAt:_ka||undefined, createdAt:row.createdAt||new Date().toISOString(), updatedAt:new Date().toISOString() });
        ensureCompany(companies, company); added++;
      });
      saveJson(STORAGE_APPS, applications);
